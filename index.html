<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CEIS 273 Practical Quiz 2 - Bright Elegant Dining Hall</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <a-scene background="color: #f5f5f5" shadow="type: pcfsoft">
        
        <!-- Bright Lighting Setup -->
        <a-entity light="type: ambient; color: #fff8dc; intensity: 0.7"></a-entity>
        
        <!-- Main bright overhead light -->
        <a-entity light="type: point; color: #fff8dc; intensity: 1.5; distance: 20; decay: 1.5; castShadow: true" 
                  position="0 7 0"></a-entity>
        
        <!-- Additional fill lights -->
        <a-entity light="type: point; color: #ffe4b5; intensity: 0.8; distance: 12; decay: 1.5" 
                  position="-6 4 6"></a-entity>
        <a-entity light="type: point; color: #ffe4b5; intensity: 0.8; distance: 12; decay: 1.5" 
                  position="6 4 -6"></a-entity>
        <a-entity light="type: point; color: #ffe4b5; intensity: 0.8; distance: 12; decay: 1.5" 
                  position="6 4 6"></a-entity>
        <a-entity light="type: point; color: #ffe4b5; intensity: 0.8; distance: 12; decay: 1.5" 
                  position="-6 4 -6"></a-entity>
        
        <!-- Soft directional light -->
        <a-entity light="type: directional; color: #fff8dc; intensity: 0.6; castShadow: true" 
                  position="5 10 5" rotation="-45 45 0"></a-entity>

        <!-- ==================== ROOM ARCHITECTURE ==================== -->
        
        <!-- Floor - Light polished wood -->
        <a-plane position="0 0 0" 
                 rotation="-90 0 0" 
                 width="20" 
                 height="20" 
                 color="#d4a574"
                 shadow="receive: true"
                 material="roughness: 0.3; metalness: 0.1">
        </a-plane>
        
        <!-- Floor pattern -->
        <a-plane position="0 0.01 0" rotation="-90 0 0" width="8" height="8" color="#c4956a"></a-plane>
        <a-plane position="0 0.02 0" rotation="-90 0 0" width="6" height="6" color="#b8956a"></a-plane>
        
        <!-- Ceiling - Light cream -->
        <a-plane position="0 8 0" rotation="90 0 0" width="20" height="20" color="#fffaf0"></a-plane>
        
        <!-- Ceiling beams -->
        <a-box position="0 7.8 0" width="20" height="0.4" depth="0.3" color="#8b7355"></a-box>
        <a-box position="0 7.8 0" width="0.3" height="0.4" depth="20" color="#8b7355"></a-box>
        
        <!-- Ceiling centerpiece -->
        <a-cylinder position="0 7.5 0" radius="3" height="0.1" color="#f5f5dc"></a-cylinder>
        <a-torus position="0 7.5 0" radius="2.5" radius-tubular="0.05" color="#daa520" rotation="90 0 0"></a-torus>

        <!-- Walls - Light warm beige -->
        <!-- Back Wall -->
        <a-plane position="0 4 -10" width="20" height="8" color="#f5f5dc"></a-plane>
        <!-- Wall trim -->
        <a-box position="0 1 -9.9" width="20" height="0.3" depth="0.1" color="#daa520"></a-box>
        <a-box position="0 7 -9.9" width="20" height="0.3" depth="0.1" color="#daa520"></a-box>
        <a-box position="-9.9 4 -9.9" width="0.3" height="8" depth="0.1" color="#daa520"></a-box>
        <a-box position="9.9 4 -9.9" width="0.3" height="8" depth="0.1" color="#daa520"></a-box>
        
        <!-- Left Wall -->
        <a-plane position="-10 4 0" rotation="0 90 0" width="20" height="8" color="#f5f5dc"></a-plane>
        <a-box position="-9.9 1 0" width="20" height="0.3" depth="0.1" color="#daa520" rotation="0 90 0"></a-box>
        <a-box position="-9.9 7 0" width="20" height="0.3" depth="0.1" color="#daa520" rotation="0 90 0"></a-box>
        
        <!-- Right Wall -->
        <a-plane position="10 4 0" rotation="0 -90 0" width="20" height="8" color="#f5f5dc"></a-plane>
        <a-box position="9.9 1 0" width="20" height="0.3" depth="0.1" color="#daa520" rotation="0 90 0"></a-box>
        <a-box position="9.9 7 0" width="20" height="0.3" depth="0.1" color="#daa520" rotation="0 90 0"></a-box>
        
        <!-- Front Wall -->
        <a-plane position="0 4 10" rotation="0 180 0" width="20" height="8" color="#f5f5dc"></a-plane>
        <a-box position="0 1 9.9" width="20" height="0.3" depth="0.1" color="#daa520"></a-box>
        <a-box position="0 7 9.9" width="20" height="0.3" depth="0.1" color="#daa520"></a-box>

        <!-- ==================== CHANDELIER ==================== -->
        <a-entity id="chandelier" position="0 6.5 0">
            <!-- Center chain -->
            <a-cylinder radius="0.05" height="1.5" color="#8b7355"></a-cylinder>
            <!-- Main body -->
            <a-sphere radius="0.4" color="#ffd700"></a-sphere>
            <!-- Arms -->
            <a-cylinder position="1.5 0 0" radius="0.08" height="3" color="#ffd700" rotation="0 0 90"></a-cylinder>
            <a-cylinder position="0 0 1.5" radius="0.08" height="3" color="#ffd700" rotation="90 0 0"></a-cylinder>
            <a-cylinder position="-1.5 0 0" radius="0.08" height="3" color="#ffd700" rotation="0 0 90"></a-cylinder>
            <a-cylinder position="0 0 -1.5" radius="0.08" height="3" color="#ffd700" rotation="90 0 0"></a-cylinder>
            <!-- Diagonal arms -->
            <a-cylinder position="1 0 1" radius="0.06" height="2.2" color="#ffd700" rotation="45 0 45"></a-cylinder>
            <a-cylinder position="-1 0 1" radius="0.06" height="2.2" color="#ffd700" rotation="45 0 -45"></a-cylinder>
            <a-cylinder position="1 0 -1" radius="0.06" height="2.2" color="#ffd700" rotation="-45 0 45"></a-cylinder>
            <a-cylinder position="-1 0 -1" radius="0.06" height="2.2" color="#ffd700" rotation="-45 0 -45"></a-cylinder>
            <!-- Candle holders -->
            <a-cylinder position="2.8 -0.3 0" radius="0.15" height="0.4" color="#ffd700"></a-cylinder>
            <a-cylinder position="0 -0.3 2.8" radius="0.15" height="0.4" color="#ffd700"></a-cylinder>
            <a-cylinder position="-2.8 -0.3 0" radius="0.15" height="0.4" color="#ffd700"></a-cylinder>
            <a-cylinder position="0 -0.3 -2.8" radius="0.15" height="0.4" color="#ffd700"></a-cylinder>
            <!-- Bright flames -->
            <a-sphere position="2.8 -0.1 0" radius="0.1" color="#ffaa00" shader="flat"></a-sphere>
            <a-sphere position="0 -0.1 2.8" radius="0.1" color="#ffaa00" shader="flat"></a-sphere>
            <a-sphere position="-2.8 -0.1 0" radius="0.1" color="#ffaa00" shader="flat"></a-sphere>
            <a-sphere position="0 -0.1 -2.8" radius="0.1" color="#ffaa00" shader="flat"></a-sphere>
            <!-- Crystals -->
            <a-cone position="2.8 -0.8 0" radius-bottom="0.05" height="0.3" color="#e0ffff" opacity="0.8"></a-cone>
            <a-cone position="0 -0.8 2.8" radius-bottom="0.05" height="0.3" color="#e0ffff" opacity="0.8"></a-cone>
            <a-cone position="-2.8 -0.8 0" radius-bottom="0.05" height="0.3" color="#e0ffff" opacity="0.8"></a-cone>
            <a-cone position="0 -0.8 -2.8" radius-bottom="0.05" height="0.3" color="#e0ffff" opacity="0.8"></a-cone>
        </a-entity>

        <!-- ==================== DINING TABLE ==================== -->
        <a-entity id="dining-table" position="0 0 0">
            <!-- Table top -->
            <a-box position="0 2.5 0" width="6" height="0.2" depth="4" color="#8b4513" shadow="cast: true; receive: true"></a-box>
            <!-- Table edge -->
            <a-box position="0 2.35 0" width="6.2" height="0.1" depth="4.2" color="#654321"></a-box>
            
            <!-- Table legs -->
            <a-cylinder position="-2.5 1.25 -1.5" radius="0.25" height="2.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="2.5 1.25 -1.5" radius="0.25" height="2.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="-2.5 1.25 1.5" radius="0.25" height="2.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="2.5 1.25 1.5" radius="0.25" height="2.5" color="#8b4513"></a-cylinder>
            
            <!-- Leg carvings -->
            <a-torus position="-2.5 1.5 -1.5" radius="0.3" radius-tubular="0.05" color="#654321" rotation="90 0 0"></a-torus>
            <a-torus position="2.5 1.5 -1.5" radius="0.3" radius-tubular="0.05" color="#654321" rotation="90 0 0"></a-torus>
            <a-torus position="-2.5 1.5 1.5" radius="0.3" radius-tubular="0.05" color="#654321" rotation="90 0 0"></a-torus>
            <a-torus position="2.5 1.5 1.5" radius="0.3" radius-tubular="0.05" color="#654321" rotation="90 0 0"></a-torus>
            
            <!-- Light table runner -->
            <a-box position="0 2.61 0" width="2" height="0.02" depth="4.1" color="#fff8dc"></a-box>
            <a-box position="0 2.62 0" width="2.1" height="0.01" depth="0.1" color="#daa520"></a-box>
        </a-entity>

        <!-- ==================== DINING CHAIRS (4 chairs) ==================== -->
        <!-- Chair 1 - Head -->
        <a-entity id="chair1" position="0 0 -2.8" rotation="0 0 0">
            <a-box position="0 1.5 0" width="1.2" height="0.15" depth="1.2" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 1.58 0" width="1.1" height="0.08" depth="1.1" color="#cd853f"></a-box>
            <a-box position="0 2.8 -0.55" width="1.2" height="2.5" depth="0.15" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 2.8 -0.48" width="0.8" height="1.8" depth="0.05" color="#cd853f"></a-box>
            <a-cylinder position="-0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="-0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-sphere position="0 4.1 -0.55" radius="0.15" color="#ffd700"></a-sphere>
        </a-entity>

        <!-- Chair 2 - Left -->
        <a-entity id="chair2" position="-3.5 0 0" rotation="0 90 0">
            <a-box position="0 1.5 0" width="1.2" height="0.15" depth="1.2" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 1.58 0" width="1.1" height="0.08" depth="1.1" color="#cd853f"></a-box>
            <a-box position="0 2.5 -0.55" width="1.2" height="2" depth="0.15" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 2.5 -0.48" width="0.8" height="1.4" depth="0.05" color="#cd853f"></a-box>
            <a-cylinder position="-0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="-0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
        </a-entity>

        <!-- Chair 3 - Right -->
        <a-entity id="chair3" position="3.5 0 0" rotation="0 -90 0">
            <a-box position="0 1.5 0" width="1.2" height="0.15" depth="1.2" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 1.58 0" width="1.1" height="0.08" depth="1.1" color="#cd853f"></a-box>
            <a-box position="0 2.5 -0.55" width="1.2" height="2" depth="0.15" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 2.5 -0.48" width="0.8" height="1.4" depth="0.05" color="#cd853f"></a-box>
            <a-cylinder position="-0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="-0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
        </a-entity>

        <!-- Chair 4 - Foot -->
        <a-entity id="chair4" position="0 0 2.8" rotation="0 180 0">
            <a-box position="0 1.5 0" width="1.2" height="0.15" depth="1.2" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 1.58 0" width="1.1" height="0.08" depth="1.1" color="#cd853f"></a-box>
            <a-box position="0 2.5 -0.55" width="1.2" height="2" depth="0.15" color="#a0522d" shadow="cast: true"></a-box>
            <a-box position="0 2.5 -0.48" width="0.8" height="1.4" depth="0.05" color="#cd853f"></a-box>
            <a-cylinder position="-0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 -0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="-0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
            <a-cylinder position="0.5 0.75 0.5" radius="0.08" height="1.5" color="#8b4513"></a-cylinder>
        </a-entity>

        <!-- ==================== MILO TIN ==================== -->
        <a-entity id="milo-tin" position="-1 2.7 -0.5">
            <a-cylinder radius="0.22" height="0.45" color="#006400" shadow="cast: true" material="metalness: 0.4; roughness: 0.3"></a-cylinder>
            <a-cylinder position="0 0.235 0" radius="0.23" height="0.03" color="#228B22" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0 -0.235 0" radius="0.23" height="0.03" color="#228B22" shadow="cast: true"></a-cylinder>
            <a-cylinder radius="0.221" height="0.28" color="#90EE90" opacity="0.95"></a-cylinder>
            <a-box position="0 0 0.22" width="0.25" height="0.18" depth="0.01" color="#FFD700"></a-box>
            <a-text value="MILO" position="0 0 0.23" align="center" width="2.5" color="#006400"></a-text>
            <a-sphere position="0 -0.08 0.22" radius="0.07" color="#FFD700"></a-sphere>
            <a-torus position="0 0.2 0" radius="0.22" radius-tubular="0.015" color="#FFD700" rotation="0 0 0"></a-torus>
            <a-torus position="0 -0.2 0" radius="0.22" radius-tubular="0.015" color="#FFD700" rotation="0 0 0"></a-torus>
        </a-entity>

        <!-- ==================== MILK TIN ==================== -->
        <a-entity id="milk-tin" position="1 2.7 -0.5">
            <a-cylinder radius="0.2" height="0.4" color="#FFFFFF" shadow="cast: true" material="metalness: 0.2; roughness: 0.2"></a-cylinder>
            <a-cylinder position="0 0.21 0" radius="0.21" height="0.03" color="#C0C0C0" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0 -0.21 0" radius="0.21" height="0.03" color="#C0C0C0" shadow="cast: true"></a-cylinder>
            <a-cylinder radius="0.201" height="0.22" color="#1E90FF" opacity="0.95"></a-cylinder>
            <a-text value="MILK" position="0 0 0.205" align="center" width="2.5" color="#FFFFFF"></a-text>
            <a-circle position="0.12 0.08 0.2" radius="0.04" color="#000000" rotation="0 0 30"></a-circle>
            <a-circle position="-0.1 -0.05 0.2" radius="0.035" color="#000000" rotation="0 0 45"></a-circle>
            <a-circle position="0.08 -0.1 0.2" radius="0.03" color="#000000" rotation="0 0 60"></a-circle>
            <a-torus position="0 0.18 0" radius="0.2" radius-tubular="0.015" color="#C0C0C0" rotation="0 0 0"></a-torus>
            <a-torus position="0 -0.18 0" radius="0.2" radius-tubular="0.015" color="#C0C0C0" rotation="0 0 0"></a-torus>
        </a-entity>

        <!-- ==================== CUP 1 ==================== -->
        <a-entity id="cup1" position="-0.4 2.7 0.8">
            <a-cylinder radius="0.18" height="0.02" color="#FFFFFF" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0 0.01 0" radius="0.15" height="0.01" color="#f0f0f0"></a-cylinder>
            <a-cylinder position="0 0.12 0" radius="0.12" height="0.22" color="#FFFFFF" shadow="cast: true" open-ended="true" side="double"></a-cylinder>
            <a-cylinder position="0 0.01 0" radius="0.12" height="0.02" color="#FFFFFF"></a-cylinder>
            <a-torus position="0 0.23 0" radius="0.12" radius-tubular="0.02" color="#daa520" rotation="0 0 0"></a-torus>
            <a-torus position="0.12 0.12 0" radius="0.06" radius-tubular="0.02" color="#FFFFFF" rotation="0 0 90" arc="180"></a-torus>
            <a-torus position="0.12 0.12 0" radius="0.06" radius-tubular="0.005" color="#daa520" rotation="0 0 90" arc="180"></a-torus>
            <a-cylinder position="0 0.14 0" radius="0.11" height="0.12" color="#8B4513" opacity="0.9"></a-cylinder>
            <a-entity animation="property: position; to: 0 0.4 0; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine">
                <a-sphere position="0 0.3 0" radius="0.04" color="#FFFFFF" opacity="0.3"></a-sphere>
                <a-sphere position="0.05 0.45 0" radius="0.03" color="#FFFFFF" opacity="0.2"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- ==================== CUP 2 ==================== -->
        <a-entity id="cup2" position="0.4 2.7 0.8">
            <a-cylinder radius="0.18" height="0.02" color="#FFFFFF" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0 0.01 0" radius="0.15" height="0.01" color="#f0f0f0"></a-cylinder>
            <a-cylinder position="0 0.12 0" radius="0.12" height="0.22" color="#FFFFFF" shadow="cast: true" open-ended="true" side="double"></a-cylinder>
            <a-cylinder position="0 0.01 0" radius="0.12" height="0.02" color="#FFFFFF"></a-cylinder>
            <a-torus position="0 0.23 0" radius="0.12" radius-tubular="0.02" color="#daa520" rotation="0 0 0"></a-torus>
            <a-torus position="0.12 0.12 0" radius="0.06" radius-tubular="0.02" color="#FFFFFF" rotation="0 0 90" arc="180"></a-torus>
            <a-torus position="0.12 0.12 0" radius="0.06" radius-tubular="0.005" color="#daa520" rotation="0 0 90" arc="180"></a-torus>
            <a-cylinder position="0 0.14 0" radius="0.11" height="0.12" color="#8B4513" opacity="0.9"></a-cylinder>
            <a-entity animation="property: position; to: 0 0.4 0; dir: alternate; dur: 3500; loop: true; easing: easeInOutSine">
                <a-sphere position="0 0.3 0" radius="0.04" color="#FFFFFF" opacity="0.3"></a-sphere>
                <a-sphere position="-0.03 0.45 0" radius="0.03" color="#FFFFFF" opacity="0.2"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- ==================== TABLE DECORATIONS ==================== -->
        
        <!-- Centerpiece vase -->
        <a-entity position="0 2.7 0">
            <a-cylinder radius="0.15" height="0.4" color="#2c5f2d" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0 0.25 0" radius="0.12" height="0.1" color="#1a3a1a"></a-cylinder>
            <a-cylinder position="0 0.5 0" radius="0.03" height="0.4" color="#228B22"></a-cylinder>
            <a-sphere position="0.1 0.7 0.1" radius="0.12" color="#e94560"></a-sphere>
            <a-sphere position="-0.1 0.75 -0.05" radius="0.1" color="#ffd700"></a-sphere>
            <a-sphere position="0.05 0.8 -0.1" radius="0.09" color="#ff6b35"></a-sphere>
        </a-entity>

        <!-- Silver spoon -->
        <a-entity position="0 2.62 0.5" rotation="0 30 90">
            <a-cylinder radius="0.015" height="0.25" color="#C0C0C0" shadow="cast: true" material="metalness: 0.8; roughness: 0.2"></a-cylinder>
            <a-sphere position="0 0.15 0" radius="0.04" color="#C0C0C0" material="metalness: 0.8; roughness: 0.2"></a-sphere>
        </a-entity>

        <!-- Napkin holder -->
        <a-entity position="2.2 2.65 0">
            <a-box width="0.4" height="0.05" depth="0.3" color="#daa520"></a-box>
            <a-box width="0.05" height="0.2" depth="0.3" color="#daa520" position="-0.2 0.1 0"></a-box>
            <a-box width="0.05" height="0.2" depth="0.3" color="#daa520" position="0.2 0.1 0"></a-box>
            <a-plane position="0 0.15 0" width="0.3" height="0.25" color="#FFFFFF" rotation="0 0 10"></a-plane>
        </a-entity>

        <!-- ==================== ROOM DECOR ==================== -->
        
        <!-- Wall sconce left -->
        <a-entity position="-9.8 3 0">
            <a-box width="0.3" height="0.8" depth="0.2" color="#daa520"></a-box>
            <a-sphere position="0 0 0.15" radius="0.15" color="#ffaa00" shader="flat"></a-sphere>
            <a-light type="point" intensity="0.6" distance="6" color="#ffaa00" position="0 0 0.5"></a-light>
        </a-entity>

        <!-- Wall sconce right -->
        <a-entity position="9.8 3 0">
            <a-box width="0.3" height="0.8" depth="0.2" color="#daa520"></a-box>
            <a-sphere position="0 0 0.15" radius="0.15" color="#ffaa00" shader="flat"></a-sphere>
            <a-light type="point" intensity="0.6" distance="6" color="#ffaa00" position="0 0 0.5"></a-light>
        </a-entity>

        <!-- Curtains -->
        <a-entity position="-9.9 4 5">
            <a-plane width="0.1" height="6" color="#fff8dc" rotation="0 90 0"></a-plane>
            <a-torus radius="0.3" radius-tubular="0.05" color="#daa520" rotation="0 0 90" position="0 3 0"></a-torus>
        </a-entity>
        
        <a-entity position="-9.9 4 -5">
            <a-plane width="0.1" height="6" color="#fff8dc" rotation="0 90 0"></a-plane>
